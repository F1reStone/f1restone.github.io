<svg viewBox="0 0 75 70" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 在 SVG 内部写入 CSS 媒体查询 -->
  <style>
    /* 浅色模式（默认）：深色/黑色 Logo */
    .logo-path { fill: #222526; }
    
    /* 深色模式：系统/浏览器切换为暗黑时，自动变成亮白色 */
    @media (prefers-color-scheme: dark) {
      .logo-path { fill: #FFFFFF; }
    }
  </style>
  
  <!-- 将原先的 fill="currentColor" 替换为 class="logo-path" -->
  <path class="logo-path" d="M35.1208 69.9946H47.6777L64.7041 28.8463L57.1487 16.12L35.1208 69.9946Z"/>
  <path class="logo-path" d="M52.36 65.5404L74.3879 44.9663L66.3004 31.6036L52.36 65.5404Z"/>
  <path class="logo-path" d="M27.8846 69.9946H32.1411L55.5525 13.4686L52.8921 9.12051L27.8846 69.9946Z"/>
  <path class="logo-path" d="M0 56.823L14.2634 69.9948L20.8454 70L48.7419 2.12105L47.2519 0H34.2695L0.00381908 32.0278L0 56.823Z"/>
</svg>